name: renovate-config-validator
on:
  workflow_call:
    inputs:
      ref:
        description: "checkout ref"
        required: false
        type: string
      validator_version:
        description: "version of renovate-config-validator. By default, the latest version is used."
        required: false
        type: string
      config_file_path:
        description: |
          Renovate Configuration file
          By default, the following files are validated.

          * .github/renovate.json
          * .github/renovate.json5
          * .gitlab/renovate.json
          * .gitlab/renovate.json5
          * .renovaterc.json
          * renovate.json
          * renovate.json5
          * .renovaterc
        required: false
        type: string
      runs-on:
        required: false
        type: string
        default: '"ubuntu-latest"'
        description: |
          JSON string for runs-on.
          e.g.
          runs-on: '"macos-latest"'
          runs-on: '["foo"]'
      node-version:
        required: false
        type: string
        default: 22.20.0
      strict:
        required: false
        type: boolean
        default: true

jobs:
  renovate-config-validator:
    timeout-minutes: 30
    runs-on: ${{fromJSON(inputs.runs-on)}}
    permissions:
      contents: read # For checkout private repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: inputs.config_file_path == ''
        with:
          ref: ${{inputs.ref}}
          persist-credentials: false
          sparse-checkout: |
            .github
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: inputs.config_file_path != ''
        with:
          ref: ${{inputs.ref}}
          persist-credentials: false
          sparse-checkout: ${{inputs.config_file_path}}
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        if: inputs.node-version != ''
        with:
          node-version: ${{inputs.node-version}}
      - uses: suzuki-shunsuke/github-action-renovate-config-validator@ee9f69e1f683ed0d08225086482b34fc9abe9300 # v2.1.0
        with:
          validator_version: ${{inputs.validator_version}}
          config_file_path: ${{inputs.config_file_path}}
          strict: ${{inputs.strict}}
